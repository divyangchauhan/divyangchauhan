<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Divyang Chauhan - Backend Engineer</title>
  <desc id="desc">Dark grid portfolio-style GitHub profile banner for Divyang Chauhan.</desc>
  <defs>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#1A2029" stroke-width="1" opacity="0.58"/>
    </pattern>
    <radialGradient id="warmGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(865 118) rotate(46) scale(360 230)">
      <stop stop-color="#F2B441" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#F2B441" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coolGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(175 330) rotate(25) scale(300 150)">
      <stop stop-color="#5CE38A" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#5CE38A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="760" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F2B441"/>
      <stop offset="1" stop-color="#F2B441" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="24" fill="#0A0C10"/>
  <rect width="1200" height="420" rx="24" fill="url(#grid)"/>
  <rect width="1200" height="420" rx="24" fill="url(#warmGlow)"/>
  <rect width="1200" height="420" rx="24" fill="url(#coolGlow)"/>

  <g font-family="'IBM Plex Mono', 'SFMono-Regular', Consolas, 'Liberation Mono', monospace">
    <rect x="48" y="34" width="26" height="26" rx="6" fill="none" stroke="#F2B441"/>
    <text x="56" y="52" fill="#F2B441" font-size="11" font-weight="700">DC</text>
    <text x="88" y="52" fill="#AAB2C0" font-size="12" letter-spacing="4">BACKEND ENGINEER</text>
  </g>

  <g transform="translate(96 112)">
    <g font-family="'IBM Plex Mono', 'SFMono-Regular', Consolas, 'Liberation Mono', monospace" font-size="13" font-weight="700" letter-spacing="4">
      <circle cx="0" cy="10" r="4" fill="#F2B441" opacity="0.55"/>
      <text x="15" y="15" fill="#F2B441">BACKEND SYSTEMS · EVENT-DRIVEN</text>
    </g>
    <text x="0" y="92" fill="#F3F5F8" font-family="'IBM Plex Sans', Inter, ui-sans-serif, system-ui, sans-serif" font-size="68" font-weight="800">Divyang Chauhan</text>
    <text x="0" y="136" fill="#AAB2C0" font-family="'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace" font-size="18">Backend engineer for systems that hold up.</text>
    <text x="0" y="188" fill="#E6E9EF" font-family="'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace" font-size="15">distributed systems</text>
    <text x="186" y="188" fill="#F2B441" font-family="'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace" font-size="15">/</text>
    <text x="208" y="188" fill="#E6E9EF" font-family="'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace" font-size="15">scalable APIs</text>
    <text x="340" y="188" fill="#F2B441" font-family="'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace" font-size="15">/</text>
    <text x="362" y="188" fill="#E6E9EF" font-family="'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace" font-size="15">serverless backends</text>
    <g transform="translate(0 236)" font-family="'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace" font-size="13" font-weight="700">
      <rect width="116" height="32" rx="8" fill="#F2B441" fill-opacity="0.12" stroke="#F2B441" stroke-opacity="0.65"/>
      <text x="18" y="21" fill="#F2B441">TypeScript</text>
      <rect x="130" width="82" height="32" rx="8" fill="#FFFFFF" fill-opacity="0.03" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <text x="151" y="21" fill="#D6DBE4">Python</text>
      <rect x="226" width="82" height="32" rx="8" fill="#FFFFFF" fill-opacity="0.03" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <text x="248" y="21" fill="#D6DBE4">NestJS</text>
      <rect x="322" width="62" height="32" rx="8" fill="#FFFFFF" fill-opacity="0.03" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <text x="342" y="21" fill="#D6DBE4">AWS</text>
      <rect x="398" width="74" height="32" rx="8" fill="#FFFFFF" fill-opacity="0.03" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <text x="418" y="21" fill="#D6DBE4">Kafka</text>
    </g>
  </g>

  <g filter="url(#shadow)" transform="translate(704 90)">
    <rect width="365" height="278" rx="14" fill="#0B0E12" stroke="#FFFFFF" stroke-opacity="0.09"/>
    <rect y="0" width="365" height="42" rx="14" fill="#0E1116"/>
    <path d="M0 42H365" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <circle cx="26" cy="21" r="5" fill="#FF5F56"/>
    <circle cx="43" cy="21" r="5" fill="#FFBD2E"/>
    <circle cx="60" cy="21" r="5" fill="#27C93F"/>
    <text x="82" y="25" fill="#788397" font-family="'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace" font-size="12">~/divyang — zsh</text>
    <text x="308" y="25" fill="#788397" font-family="'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace" font-size="12" letter-spacing="2">BUILD</text>

    <g font-family="'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace" font-size="14" font-weight="600">
      <text x="26" y="82" fill="#5CE38A">➜</text>
      <text x="46" y="82" fill="#788397">~</text>
      <text x="64" y="78" fill="#E6E9EF">whoami</text>
      <text x="26" y="101" fill="#AAB2C0">divyang_chauhan</text>

      <text x="26" y="133" fill="#5CE38A">➜</text>
      <text x="46" y="133" fill="#788397">~</text>
      <text x="64" y="133" fill="#E6E9EF">cat role.txt</text>
      <text x="26" y="156" fill="#F2B441">Backend Engineer</text>

      <text x="26" y="188" fill="#5CE38A">➜</text>
      <text x="46" y="188" fill="#788397">~</text>
      <text x="64" y="188" fill="#E6E9EF">stack --top</text>
      <text x="26" y="211" fill="#AAB2C0">TypeScript · Python · NestJS · AWS</text>

      <text x="26" y="243" fill="#5CE38A">➜</text>
      <text x="46" y="243" fill="#788397">~</text>
      <text x="64" y="243" fill="#E6E9EF">focus</text>
      <text x="26" y="266" fill="#AAB2C0">event-driven · serverless · web3</text>
    </g>
  </g>

  <rect x="170" y="408" width="760" height="1" fill="url(#rule)"/>
</svg>
